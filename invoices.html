<script src="https://unpkg.com/dexie/dist/dexie.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
    /* تحسينات لشاشة الجوال */
    body {
        margin: 0;
        padding: 0;
        font-family: sans-serif;
    }
    /* تحسين شكل نافذة تنبيهات الجوال */
    .swal2-popup {
        font-size: 0.9rem !important;
    }
    /* التأكد من أن الأزرار كبيرة كفاية للمس */
    button {
        min-height: 44px;
        touch-action: manipulation;
    }
</style>

<script>
    // 0. حماية الصفحة بالرقم السري (بتصميم مناسب للجوال)
    (function checkAccess() {
        const pin = prompt("🔒 دخول الموظفين:\nيرجى إدخال الرقم السري:");
        if (pin !== "0005") {
            alert("❌ الرقم السري خاطئ!");
            window.location.href = "about:blank"; // إغلاق الصفحة
        }
    })();

    // 1. إعداد Supabase
    const SUPABASE_URL = 'https://aocsaoveaooewncirufr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvY3Nhb3ZlYW9vZXduY2lydWZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzM1ODYsImV4cCI6MjA5MjEwOTU4Nn0.IV5fSBv9B1Mnf4xKLnFNrHmlobdYGKRqzhm9XrEdJRU';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. إعداد قاعدة البيانات المحلية Dexie
    const db = new Dexie("LaundryAppDB");
    db.version(1).stores({ 
        invoices: '++id, inv_num, customer_name, synced' 
    });

    // 3. وظيفة حفظ الفاتورة (متوافقة مع شاشات اللمس)
    async function saveInvoice() {
        try {
            const nameEl = document.getElementById('custName');
            const phoneEl = document.getElementById('custPhone');
            const invNumEl = document.getElementById('invNum');
            const totalEl = document.getElementById('finalTotal');
            const monthlyCheck = document.getElementById('monthlyPayCheck');

            if (!nameEl || !phoneEl) return;

            const name = nameEl.value.trim();
            const phone = phoneEl.value.trim();
            
            if (!name || !phone) {
                return alert("⚠️ يرجى كتابة اسم الزبون ورقمه");
            }

            // منع الضغط المتكرر على الجوال
            const btn = document.getElementById('printBtn');
            if(btn) {
                btn.disabled = true;
                btn.innerText = "جاري الحفظ...";
            }

            // معالجة المبلغ (إزالة BHD وتحويله لرقم دقيق)
            const rawTotal = totalEl.innerText;
            const cleanTotal = parseFloat(rawTotal.replace(/[^\d.-]/g, '')) || 0;

            // تجميع الخدمات
            const servicesList = (typeof items !== 'undefined' && items.length > 0) 
                ? items.map(i => `${i.name} (${i.qty})`).join(', ') 
                : "خدمات غسيل";

            const data = {
                inv_num: invNumEl.innerText,
                customer_name: name,
                phone: phone,
                total_amount: cleanTotal,
                services: servicesList,
                is_monthly: (monthlyCheck && monthlyCheck.checked) ? "نعم" : "لا",
                synced: 0
            };

            // أ. الحفظ المحلي (يضمن عدم ضياع البيانات في المناطق ضعيفة التغطية)
            await db.invoices.add(data);

            // ب. المزامنة السحابية
            if (navigator.onLine) {
                const { error } = await supabaseClient.from('invoices').insert([{
                    inv_num: data.inv_num,
                    customer_name: data.customer_name,
                    phone: data.phone,
                    total_amount: data.total_amount,
                    services: data.services,
                    is_monthly: data.is_monthly
                }]);

                if (!error) {
                    await db.invoices.where("inv_num").equals(data.inv_num).modify({synced: 1});
                    alert("✅ تم الحفظ بنجاح");
                } else {
                    console.error(error);
                    alert("💾 تم الحفظ محلياً (فشل الاتصال بالسحابة)");
                }
            } else {
                alert("📶 وضع الأوفلاين: تم الحفظ في ذاكرة الجوال");
            }

            // تصفير الواجهة للطلب الجديد
            setTimeout(() => location.reload(), 500);

        } catch (e) {
            console.error(e);
            alert("❌ خطأ في النظام");
            if(btn) btn.disabled = false;
        }
    }
</script>
