    const db = new Dexie("LaundryAppDB");
    db.version(1).stores({ invoices: '++id, inv_num, customer_name, synced' });

    async function saveInvoice() {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        if (!name || !phone) return alert("يرجى إكمال البيانات");

        const btn = document.getElementById('printBtn');
        btn.disabled = true;

        const data = {
            inv_num: document.getElementById('invNum').innerText,
            customer_name: name,
            phone: phone,
            total_amount: document.getElementById('finalTotal').innerText,
            services: items.map(i => `${i.name} (x${i.qty})`).join(', '),
            is_monthly: document.getElementById('monthlyPayCheck').checked ? "نعم" : "لا",
            synced: 0
        };

        try {
            // حفظ محلي
            await db.invoices.add(data);

            // حفظ سحابي
            if (navigator.onLine) {
                const { error } = await supabaseClient.from('invoices').insert([{
                    inv_num: data.inv_num,
                    customer_name: data.customer_name,
                    phone: data.phone,
                    total_amount: data.total_amount,
                    services: data.services,
                    is_monthly: data.is_monthly
                }]);
                if (!error) await db.invoices.where("inv_num").equals(data.inv_num).modify({synced: 1});
            }
            alert("تم الحفظ بنجاح");
            location.reload();
        } catch (e) {
            alert("تم الحفظ في ذاكرة الجهاز (أوفلاين)");
