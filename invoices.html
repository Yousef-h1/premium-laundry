<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Laundry - Invoices</title>

    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f8fafc; direction: rtl; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        h2 { color: #1e40af; font-size: 20px; text-align: center; margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #475569; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #3b82f6; }
        .info-box { background: #f1f5f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
        #invNum { font-weight: bold; color: #1e40af; }
        #finalTotal { font-size: 24px; font-weight: 900; color: #0f172a; }
        button { min-height: 50px; width: 100%; background-color: #1e40af; color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); background-color: #1e3a8a; }
        .flex-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .flex-row input { margin-bottom: 0; width: auto; }
    </style>
</head>
<body>

<div class="container" id="appContent" style="display:none;">
    <h2>🧾 فاتورة جديدة</h2>
    
    <div class="info-box">
        <label>رقم الفاتورة</label>
        <div id="invNum">INV-${Math.floor(Date.now()/1000)}</div>
    </div>

    <label>اسم الزبون</label>
    <input type="text" id="custName" placeholder="أدخل اسم الزبون">

    <label>رقم الهاتف</label>
    <input type="tel" id="custPhone" placeholder="33XXXXXX">

    <div class="info-box">
        <label>المبلغ الإجمالي</label>
        <div id="finalTotal">0.000 BHD</div>
    </div>

    <div class="flex-row">
        <input type="checkbox" id="monthlyPayCheck">
        <label for="monthlyPayCheck" style="margin:0">اشتراك دفع شهري</label>
    </div>

    <button id="printBtn" onclick="saveInvoice()">حفظ الفاتورة والمزامنة</button>
</div>

<script>
    // 0. الحماية بالرقم السري
    (function checkAccess() {
        const pin = prompt("🔒 دخول الموظفين:\nيرجى إدخال الرقم السري:");
        if (pin === "0005") {
            document.getElementById('appContent').style.display = 'block';
        } else {
            alert("❌ الرقم السري خاطئ!");
            window.location.href = "about:blank"; 
        }
    })();

    // 1. إعداد Supabase
    const SUPABASE_URL = 'https://aocsaoveaooewncirufr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvY3Nhb3ZlYW9vZXduY2lydWZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzM1ODYsImV4cCI6MjA5MjEwOTU4Nn0.IV5fSBv9B1Mnf4xKLnFNrHmlobdYGKRqzhm9XrEdJRU';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. إعداد Dexie
    const db = new Dexie("LaundryAppDB");
    db.version(1).stores({ 
        invoices: '++id, inv_num, customer_name, synced' 
    });

    // 3. وظيفة الحفظ
    async function saveInvoice() {
        const btn = document.getElementById('printBtn');
        try {
            const nameEl = document.getElementById('custName');
            const phoneEl = document.getElementById('custPhone');
            const invNumEl = document.getElementById('invNum');
            const totalEl = document.getElementById('finalTotal');
            const monthlyCheck = document.getElementById('monthlyPayCheck');

            const name = nameEl.value.trim();
            const phone = phoneEl.value.trim();
            
            if (!name || !phone) {
                return alert("⚠️ يرجى كتابة اسم الزبون ورقمه");
            }

            btn.disabled = true;
            btn.innerText = "جاري الحفظ...";

            const cleanTotal = parseFloat(totalEl.innerText.replace(/[^\d.-]/g, '')) || 0;

            const data = {
                inv_num: invNumEl.innerText,
                customer_name: name,
                phone: phone,
                total_amount: cleanTotal,
                services: "غسيل ملابس", // يمكن ربطها بنظام السلة لاحقاً
                is_monthly: monthlyCheck.checked ? "نعم" : "لا",
                synced: 0,
                created_at: new Date().toISOString()
            };

            await db.invoices.add(data);

            if (navigator.onLine) {
                const { error } = await supabaseClient.from('invoices').insert([{
                    inv_num: data.inv_num,
                    customer_name: data.customer_name,
                    phone: data.phone,
                    total_amount: data.total_amount,
                    services: data.services,
                    is_monthly: data.is_monthly
                }]);

                if (!error) {
                    await db.invoices.where("inv_num").equals(data.inv_num).modify({synced: 1});
                    alert("✅ تم الحفظ والمزامنة");
                } else {
                    alert("💾 حفظ محلي (خطأ في السحابة)");
                }
            } else {
                alert("📶 تم الحفظ (وضع أوفلاين)");
            }

            location.reload();

        } catch (e) {
            alert("❌ خطأ في النظام");
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
