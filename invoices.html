<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مغسلة الخدمة المميزة - POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --danger: #ef4444; --success: #2563eb; --bg: #f8fafc; --warning: #f59e0b; }
        html, body { height: 100%; margin: 0; padding: 0; overflow-x: hidden; background-color: var(--bg); width: 100%; }
        body { font-family: 'Tajawal', sans-serif; display: flex; flex-direction: column; }
        
        #loginOverlay { position: fixed; inset: 0; background: rgba(37, 99, 235, 0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 999999; padding: 20px; }
        .login-card { background: rgba(255, 255, 255, 0.9); padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 100%; max-width: 350px; text-align: center; position: relative; }
        .login-card input { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #ddd; border-radius: 12px; font-size: 1.8rem; text-align: center; outline: none; letter-spacing: 5px; }
        
        .back-to-home { position: absolute; top: 15px; right: 15px; color: var(--primary); font-size: 1.2rem; text-decoration: none; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; background: #fff; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .main-container { width: 100%; margin: 0 auto; display: grid; grid-template-columns: 1fr 450px; gap: 0; height: 100vh; }
        #mainApp { display: none; width: 100%; height: 100%; }
        
        .input-panel { background: #fff; padding: 20px; box-sizing: border-box; border-left: 1px solid #e2e8f0; overflow-y: auto; height: 100vh; }
        .invoice-preview { background: #fff; padding: 20px; box-sizing: border-box; overflow-y: auto; height: 100vh; border-right: 2px solid #f1f5f9; position: relative; }
        
        @media (max-width: 900px) { 
            .main-container { display: flex; flex-direction: column; height: auto; overflow-y: visible; } 
            .input-panel, .invoice-preview { height: auto; min-height: unset; overflow-y: visible; width: 100%; border: none; padding: 15px; box-sizing: border-box; }
            .invoice-preview { border-top: 5px solid var(--primary); margin-top: 20px; padding-bottom: 100px; }
            .remove-btn { position: relative !important; left: 0 !important; top: 0 !important; float: left; margin-bottom: -25px; background: #fee2e2 !important; padding: 5px 10px !important; border-radius: 8px !important; z-index: 10; }
            input, select, button { font-size: 16px !important; width: 100% !important; box-sizing: border-box !important; }
        }

        .form-group { margin-bottom: 12px; width: 100%; }
        label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 0.85rem; color: #64748b; }
        input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 1rem; background-color: #fff; box-sizing: border-box; }
        
        #customPriceContainer, #overridePriceContainer { padding: 10px; border-radius: 10px; margin-bottom: 12px; width: 100%; box-sizing: border-box; }
        #customPriceContainer { background: #fff9db; border: 1px solid #fab005; display: none; }
        #overridePriceContainer { background: #f0f9ff; border: 1px solid #7dd3fc; }
        
        .service-options { display: flex; gap: 8px; background: #f1f5f9; padding: 4px; border-radius: 12px; width: 100%; box-sizing: border-box; }
        .option-item { flex: 1; position: relative; text-align: center; }
        .option-item input { position: absolute; opacity: 0; }
        .option-item span { display: block; padding: 12px 2px; border-radius: 10px; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .option-item input:checked + span { background: var(--primary); color: white; font-weight: bold; }
        
        .btn-add { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        .btn-print { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        
        .bill-table { width: 100%; margin-top: 15px; border-top: 2px solid #333; }
        .bill-item-row { border-bottom: 1px solid #eee; padding: 12px 0; display: flex; flex-direction: column; position: relative; }
        .item-main-info { display: flex; justify-content: space-between; font-weight: bold; font-size: 1rem; color: #000; }
        .item-sub-info { display: flex; justify-content: space-between; font-size: 0.8rem; color: #444; margin-top: 6px; border-top: 1px dashed #eee; padding-top: 6px; }

        .inv-meta { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #ddd; font-size: 0.85rem; }
        .total-box { margin-top: 10px; padding: 15px; background: #1e293b; color: #fff; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }
        .discount-row { display: none; justify-content: space-between; padding: 8px 10px; color: var(--danger); font-weight: bold; font-size: 0.9rem; border-top: 1px dashed #ddd; }
        .search-box { background: #f1f5f9; padding: 15px; border-radius: 15px; border: 1px solid #e2e8f0; margin-bottom: 20px; width: 100%; box-sizing: border-box; }
        
        .discount-container { margin-top: 15px; display: flex; align-items: center; gap: 8px; background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px dashed #cbd5e1; width: 100%; box-sizing: border-box; }

        @media print { 
            .no-print, #loginOverlay, .remove-btn { display: none !important; } 
            .main-container { display: block; }
            .invoice-preview { width: 100%; border: none; padding: 0; }
            body { background: white; }
        }
    </style>
</head>
<body>

<div id="loginOverlay" class="no-print">
    <div class="login-card">
        <a href="index.html" class="back-to-home"><i class="fa-solid fa-arrow-right"></i></a>
        <h2 style="color:var(--primary)">الخدمة المميزة 🧺</h2>
        <p>أدخل الرقم السري للدخول</p>
        <input type="password" id="mainPassInput" placeholder="••••" maxlength="4" inputmode="numeric">
        <button class="btn-add" onclick="handleAppLogin()">دخول النظام</button>
    </div>
</div>

<div class="main-container" id="mainApp">
    <div class="input-panel no-print">
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
            <a href="index.html" style="background: var(--bg); color: var(--primary); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 12px; border: 1px solid #e2e8f0; text-decoration: none;">
                <i class="fa-solid fa-arrow-right"></i>
            </a>
            <h2 style="margin:0; color:var(--primary); font-size: 1.3rem;">الخدمة المميزة 🧺</h2>
        </div>

        <div class="search-box">
            <label>🔍 بحث سريع (رقم فاتورة/هاتف)</label>
            <input type="text" id="searchInput" placeholder="ابحث هنا..." onkeypress="handleSearch(event)" inputmode="search">
        </div>

        <h4 style="margin:0 0 12px; color:var(--primary)">بيانات العميل</h4>
        <div class="form-group"><input type="text" id="custName" placeholder="الاسم / Name"></div>
        <div class="form-group"><input type="tel" id="custPhone" placeholder="الهاتف / Phone"></div>
        
        <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin-top: -5px; margin-bottom: 15px; padding: 5px;">
            <input type="checkbox" id="monthlyPayCheck" style="width: 20px; height: 20px; cursor: pointer;">
            <label for="monthlyPayCheck" style="margin: 0; color: #1e293b; font-size: 0.9rem; cursor: pointer;">إضافة للدفع الشهري (العمود K)</label>
        </div>
        
        <h4 style="margin:15px 0 10px; color:var(--primary)">الخدمات Services</h4>
        <div class="form-group">
            <select id="itemType" onchange="togglePriceInput()">
                <optgroup label="عامة | General">
                    <option value="عباية بالبخار | Abaya Steam" data-wash="1.000" data-iron="0.500">عباية بالبخار | Abaya Steam</option>
                    <option value="شيلة - حجاب | Hijab" data-wash="0.200" data-iron="0.200">شيلة - حجاب | Hijab</option>
                    <option value="غترة | Ghutra" data-wash="0.400" data-iron="0.200">غترة | Ghutra</option>
                    <option value="بشت | Bisht" data-wash="1.000" data-iron="0.500">بشت | Bisht</option>
                    <option value="جاكيت (بخار) | Jacket Steam" data-wash="0.800" data-iron="0.000">جاكيت (بخار) | Jacket Steam</option>
                    <option value="فوطة استحمام | Towel" data-wash="0.600" data-iron="0.000">فوطة استحمام | Towel</option>
                </optgroup>
                <optgroup label="رجالي | Gents">
                    <option value="ثوب | Thobe" data-wash="0.500" data-iron="0.150">ثوب | Thobe</option>
                    <option value="ثوب بالبخار | Thobe Steam" data-wash="0.600" data-iron="0.200">ثوب بالبخار | Thobe Steam</option>
                    <option value="بنطلون طويل | Trouser" data-wash="0.600" data-iron="0.300">بنطلون طويل | Trouser</option>
                    <option value="بنطلون قصير | Short" data-wash="0.400" data-iron="0.200">بنطلون قصير | Short</option>
                    <option value="بدلة عسكرية | Uniform" data-wash="1.000" data-iron="0.400">بدلة عسكرية | Uniform</option>
                    <option value="فانيلة | T-Shirt" data-wash="0.400" data-iron="0.200">فانيلة | T-Shirt</option>
                    <option value="فانيلة داخلية | Underwear Shirt" data-wash="0.200" data-iron="0.000">فانيلة داخلية | Underwear Shirt</option>
                    <option value="كلسون | Underwear" data-wash="0.200" data-iron="0.000">كلسون | Underwear</option>
                    <option value="جوارب | Socks" data-wash="0.100" data-iron="0.000">جوارب | Socks</option>
                </optgroup>
                <optgroup label="نسائي | Ladies">
                    <option value="قميص بيت نسائي | Ladies House Shirt" data-wash="0.600" data-iron="0.400">قميص بيت نسائي | Ladies House Shirt</option>
                    <option value="تنورة | Skirt" data-wash="0.600" data-iron="0.300">تنورة | Skirt</option>
                </optgroup>
                <optgroup label="مفروشات | Bedding">
                    <option value="غطاء سرير فردي | Single Bed Cover" data-wash="0.500" data-iron="0.000">غطاء سرير فردي | Single Bed Cover</option>
                    <option value="غطاء سرير مزدوج | Double Bed Cover" data-wash="0.800" data-iron="0.000">غطاء سرير مزدوج | Double Bed Cover</option>
                    <option value="بطانية كبيرة | Large Blanket" data-wash="2.000" data-iron="0.000">بطانية كبيرة | Large Blanket</option>
                    <option value="بطانية صغيرة | Small Blanket" data-wash="1.500" data-iron="0.000">بطانية صغيرة | Small Blanket</option>
                    <option value="غطاء مخدة | Pillow Cover" data-wash="0.200" data-iron="0.000">غطاء مخدة | Pillow Cover</option>
                    <option value="ستارة 2م | Curtain 2m" data-wash="1.000" data-iron="0.000">ستارة 2م | Curtain 2m</option>
                    <option value="سجاد 2م | Carpet 2m" data-wash="1.000" data-iron="0.000">سجاد 2م | Carpet 2m</option>
                </optgroup>
                <optgroup label="يدوي | Manual">
                    <option value="فستان | Dress" data-manual="true" data-wash="0.000" data-iron="0.000">فستان | Dress (يدوي)</option>
                    <option value="بدلة رسمية | Suit" data-manual="true" data-wash="0.000" data-iron="0.000">بدلة رسمية | Suit (يدوي)</option>
                    <option value="شنطة | Bag" data-manual="true" data-wash="0.000" data-iron="0.000">شنطة | Bag (يدوي)</option>
                    <option value="حذاء | Shoes" data-wash="2.000" data-iron="0.000">حذاء | Shoes</option>
                    <option value="قبعة | Cap" data-wash="0.200" data-iron="0.000">قبعة | Cap</option>
                </optgroup>
            </select>
        </div>

        <div id="customPriceContainer">
            <label>السعر اليدوي (BHD)</label>
            <input type="number" id="customPrice" step="0.100" placeholder="0.000" inputmode="decimal">
        </div>

        <div id="overridePriceContainer">
            <label>تعديل السعر (اختياري)</label>
            <input type="number" id="overridePrice" step="0.100" placeholder="0.000" inputmode="decimal">
        </div>

        <div class="service-options">
            <label class="option-item"><input type="radio" name="serviceMode" value="غسيل وكوي" checked><span>غسيل وكوي</span></label>
            <label class="option-item"><input type="radio" name="serviceMode" value="كوي فقط"><span>كوي فقط</span></label>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px;">
            <input type="number" id="qty" value="1" min="1" inputmode="numeric">
            <select id="urgentType"><option value="1" data-label="عادي">عادي</option><option value="2" data-label="مستعجل">مستعجل X2</option></select>
        </div>

        <button class="btn-add" style="margin-top:20px" onclick="addItem()">إضافة للطلب +</button>
    </div>

    <div class="invoice-preview" id="invoice">
        <div style="text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px;">
            <h3 style="margin: 0; color:#000">مغسلة الخدمة المميزة</h3>
            <p style="font-size: 0.75rem; margin: 2px 0;">Premium Service Laundry</p>
        </div>
        
        <div class="inv-meta">
            <div>رقم الفاتورة: #<span id="invNum" style="font-weight: bold;">---</span></div>
            <div id="dateNow"></div>
        </div>

        <div style="margin: 10px 0; font-size: 0.9rem;">
            <div>العميل: <span id="dispName" style="font-weight: bold;">---</span></div>
            <div>الهاتف: <span id="dispPhone" style="font-weight: bold;">---</span></div>
        </div>

        <div id="billBody" class="bill-table"></div>

        <div id="discountRow" class="discount-row">
            <span>الخصم المستحق:</span>
            <span id="dispDiscount">0.000-</span>
        </div>

        <div class="total-box">
            <span>إجمالي الفاتورة</span>
            <span id="finalTotal" style="font-weight:900; font-size:1.6rem">0.000</span>
        </div>

        <div class="discount-container no-print">
            <label style="margin:0; font-size:0.8rem">خصم (BHD):</label>
            <input type="number" id="discountAmount" step="0.100" placeholder="0.000" inputmode="decimal">
            <button class="btn-apply-discount" style="background:var(--warning); color:white; border:none; padding:8px 15px; border-radius:8px; font-weight:bold" onclick="applyDiscount()">تطبيق</button>
        </div>
        
        <button id="printBtn" class="btn-print no-print" onclick="processAndPrint()">اعتماد وإرسال الطلب ✅</button>
    </div>
</div>

<script>
    const APP_PASS = "0005";
    const WEBHOOK_URL_SEARCH = "https://n8n.awj-bh.cloud/webhook/search-invoice";
    const WEBHOOK_URL_SAVE = "https://n8n.awj-bh.cloud/webhook/725f1ccb-6fa7-421d-9b68-8b60322702c3";
    let items = [];
    let currentDiscount = 0;

    function handleAppLogin() {
        if (document.getElementById('mainPassInput').value === APP_PASS) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
        } else {
            alert("⚠️ الرقم السري خاطئ!");
        }
    }

    async function handleSearch(e) {
        if (e.key === 'Enter') {
            const query = e.target.value;
            if (!query) return;
            try {
                const response = await fetch(WEBHOOK_URL_SEARCH, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: "search", searchQuery: query })
                });
                const data = await response.json();
                const finalData = Array.isArray(data) ? data[0] : data;
                if (finalData && (finalData.customer || finalData.found)) {
                    document.getElementById('custName').value = (finalData.customer || "").replace('=', '');
                    document.getElementById('custPhone').value = (finalData.phone || "").toString().replace('=', '');
                    document.getElementById('invNum').innerText = (finalData.invoiceNumber || query).toString().replace('=', '');
                    document.getElementById('dispName').innerText = document.getElementById('custName').value;
                    document.getElementById('dispPhone').innerText = document.getElementById('custPhone').value;
                    renderBill();
                }
            } catch (err) { alert("⚠️ خطأ في الاتصال."); }
        }
    }

    function togglePriceInput() {
        const opt = document.getElementById('itemType').options[document.getElementById('itemType').selectedIndex];
        const isManual = opt.getAttribute('data-manual') === "true";
        document.getElementById('customPriceContainer').style.display = isManual ? 'block' : 'none';
        document.getElementById('overridePriceContainer').style.display = isManual ? 'none' : 'block';
    }

    function addItem() {
        const sel = document.getElementById('itemType');
        const opt = sel.options[sel.selectedIndex];
        const mode = document.querySelector('input[name="serviceMode"]:checked').value;
        const qty = parseInt(document.getElementById('qty').value) || 1;
        const urgentSel = document.getElementById('urgentType');
        const urgentLabel = urgentSel.options[urgentSel.selectedIndex].getAttribute('data-label');
        const urgentVal = parseInt(urgentSel.value);
        
        let washPrice = parseFloat(opt.dataset.wash) || 0;
        let ironPrice = parseFloat(opt.dataset.iron) || 0;

        let unitPrice = (opt.getAttribute('data-manual') === "true") ? 
            (parseFloat(document.getElementById('customPrice').value) || 0) : 
            (mode === 'غسيل وكوي' ? washPrice : ironPrice);
        
        const override = parseFloat(document.getElementById('overridePrice').value);
        if (!isNaN(override) && override > 0) unitPrice = override;

        items.push({ 
            id: Date.now(), 
            name: opt.value, 
            qty: qty, 
            mode: mode, 
            urgency: urgentLabel,
            price: (unitPrice * qty * urgentVal) 
        });
        
        renderBill();
        document.getElementById('overridePrice').value = "";
        document.getElementById('customPrice').value = "";
        
        if(window.innerWidth < 900) {
            document.getElementById('invoice').scrollIntoView({behavior: 'smooth'});
        }
    }

    function removeItem(id) {
        items = items.filter(x => x.id !== id);
        renderBill();
    }

    function applyDiscount() {
        currentDiscount = parseFloat(document.getElementById('discountAmount').value) || 0;
        renderBill();
    }

    function renderBill() {
        const container = document.getElementById('billBody');
        container.innerHTML = "";
        let total = 0;
        
        items.forEach(i => {
            const row = document.createElement('div');
            row.className = 'bill-item-row';
            row.innerHTML = `
                <div class="item-main-info">
                    <span>${i.name}</span>
                    <span>${i.price.toFixed(3)}</span>
                </div>
                <div class="item-sub-info">
                    <span>الكمية: ${i.qty} | ${i.mode}</span>
                    <span style="font-weight:bold">${i.urgency}</span>
                </div>
                <button class="remove-btn no-print" onclick="removeItem(${i.id})">حذف ✕</button>
            `;
            container.appendChild(row);
            total += i.price;
        });
        
        const discRow = document.getElementById('discountRow');
        if(currentDiscount > 0) {
            discRow.style.display = 'flex';
            document.getElementById('dispDiscount').innerText = currentDiscount.toFixed(3) + "-";
        } else {
            discRow.style.display = 'none';
        }

        const netTotal = Math.max(0, total - currentDiscount);
        document.getElementById('finalTotal').innerText = netTotal.toFixed(3) + " BHD";
    }

    async function processAndPrint() {
        if (items.length === 0) return alert("الفاتورة فارغة!");
        
        const btn = document.getElementById('printBtn');
        btn.disabled = true;
        btn.innerText = "جاري الاعتماد والإرسال...";

        const formattedItems = items.map(i => `• ${i.name} (${i.mode} - ${i.urgency}) x${i.qty}`).join('\n');
        const phoneInput = document.getElementById('custPhone').value;
        const isMonthly = document.getElementById('monthlyPayCheck').checked;

        const payload = {
            action: 'save',
            invoiceNumber: document.getElementById('invNum').innerText,
            customer: document.getElementById('custName').value,
            phone: phoneInput,
            total: document.getElementById('finalTotal').innerText,
            items: formattedItems,
            discount: currentDiscount.toFixed(3),
            k: isMonthly ? phoneInput : ""
        };
        try {
            const response = await fetch(WEBHOOK_URL_SAVE, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(payload) 
            });
            
            if(response.ok) {
                alert("✅ تم اعتماد الطلب بنجاح");
                location.reload();
            } else {
                throw new Error('Failed to save');
            }
        } catch (e) { 
            alert("⚠️ خطأ في الاتصال بالنظام."); 
            btn.disabled = false;
            btn.innerText = "اعتماد وإرسال الطلب ✅";
        }
    }

    document.getElementById('dateNow').innerText = new Date().toLocaleDateString('ar-BH');
    document.getElementById('custName').oninput = e => document.getElementById('dispName').innerText = e.target.value || "---";
    document.getElementById('custPhone').oninput = e => document.getElementById('dispPhone').innerText = e.target.value || "---";
</script>
</body>
</html>
