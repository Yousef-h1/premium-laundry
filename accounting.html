<script src="https://unpkg.com/dexie/dist/dexie.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const SUPABASE_URL = 'https://fG4MwwZOl5zmJtoy3zoPHg.supabase.co';
    const SUPABASE_KEY = 'aocsaoveaooewncirufr';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const db = new Dexie("AccountingAppDB");
    db.version(1).stores({ accounting: '++id, description, synced' });

    async function submitEntry() {
        const entry = {
            type: document.getElementById('t').value,
            description: document.getElementById('d').value,
            cash_amount: document.getElementById('c').value,
            benefit_amount: document.getElementById('b').value,
            total_amount: (parseFloat(document.getElementById('c').value || 0) + parseFloat(document.getElementById('b').value || 0)).toFixed(3),
            synced: 0
        };

        try {
            await db.accounting.add(entry);
            if (navigator.onLine) {
                const { error } = await supabaseClient.from('accounting').insert([entry]);
                if (!error) await db.accounting.where("description").equals(entry.description).modify({synced: 1});
            }
            alert("تم التسجيل");
            document.getElementById('fForm').reset();
        } catch (e) {
            alert("تم الحفظ محلياً");
        }
    }
</script>
