<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Laundry - Accounting</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; padding: 20px; text-align: center; direction: rtl; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 20px; shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { background-color: #1e40af; color: white; font-weight: bold; border: none; cursor: pointer; }
        button:disabled { background-color: #ccc; }
    </style>
</head>
<body>

    <div class="container" id="mainContent" style="display:none;">
        <h3>تسجيل عملية محاسبية</h3>
        <form id="fForm" onsubmit="event.preventDefault(); submitEntry();">
            <select id="t"><option value="إيراد">إيراد</option><option value="مصروف">مصروف</option></select>
            <input type="text" id="d" placeholder="البيان / الوصف" required>
            <input type="number" id="c" step="0.001" placeholder="مبلغ كاش">
            <input type="number" id="b" step="0.001" placeholder="مبلغ بنفت">
            <button type="submit" id="subBtn">تسجيل العملية</button>
        </form>
    </div>

    <script>
        // 0. حماية بترميز صحيح
        const pin = prompt("ادخل الرقم السري (0005):");
        if (pin === "0005") {
            document.getElementById('mainContent').style.display = 'block';
        } else {
            alert("خطأ في الرقم السري");
            window.location.href = "about:blank";
        }

        const SUPABASE_URL = 'https://aocsaoveaooewncirufr.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvY3Nhb3ZlYW9vZXduY2lydWZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzM1ODYsImV4cCI6MjA5MjEwOTU4Nn0.IV5fSBv9B1Mnf4xKLnFNrHmlobdYGKRqzhm9XrEdJRU';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const db = new Dexie("AccountingAppDB");
        db.version(1).stores({ accounting: '++id, description, synced' });

        async function submitEntry() {
            const btn = document.getElementById('subBtn');
            btn.disabled = true;
            
            const cash = parseFloat(document.getElementById('c').value || 0);
            const benefit = parseFloat(document.getElementById('b').value || 0);
            const entry = {
                type: document.getElementById('t').value,
                description: document.getElementById('d').value,
                cash_amount: cash,
                benefit_amount: benefit,
                total_amount: (cash + benefit).toFixed(3),
                created_at: new Date().toISOString()
            };

            await db.accounting.add({...entry, synced: 0});

            if (navigator.onLine) {
                const { error } = await supabaseClient.from('accounting').insert([entry]);
                if (!error) alert("تم الحفظ والمزامنة");
                else alert("حفظ محلي فقط");
            } else {
                alert("تم الحفظ (أوفلاين)");
            }
            
            document.getElementById('fForm').reset();
            btn.disabled = false;
        }
    </script>
</body>
</html>
