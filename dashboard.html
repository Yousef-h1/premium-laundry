<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم Premium Service Laundry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .stat-card { border-radius: 1.25rem; transition: transform 0.2s; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 50; }
        .bg-gradient-daily { background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%); }
    </style>
</head>
<body class="p-4 md:p-8 text-right">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <div>
                <h1 class="text-3xl font-black text-slate-800">إدارة المغسلة</h1>
                <p class="text-slate-500 text-sm">نظام التدقيق المالي الذكي</p>
            </div>
            <div class="flex gap-3">
                <button onclick="fetchData()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold transition border border-slate-200">تحديث البيانات ↻</button>
                <div class="bg-blue-600 text-white px-5 py-2 rounded-lg shadow-lg font-bold text-center" id="currentDateDisplay"></div>
            </div>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10 text-center">
            <div class="stat-card bg-white p-6 shadow-sm border border-slate-100 border-b-4 border-b-blue-500">
                <div class="text-blue-500 text-xs font-bold mb-1 uppercase">إجمالي العملاء</div>
                <div id="totalCustomers" class="text-4xl font-black text-slate-800">--</div>
            </div>
            <div class="stat-card bg-white p-6 shadow-sm border border-slate-100 border-b-4 border-b-green-500">
                <div class="text-green-500 text-xs font-bold mb-1 uppercase">طلبات اليوم</div>
                <div id="todayOrders" class="text-4xl font-black text-slate-800">--</div>
            </div>
            <div class="stat-card bg-white p-6 shadow-sm border border-slate-100 border-b-4 border-b-amber-500">
                <div class="text-amber-500 text-xs font-bold mb-1 uppercase">تحت المعالجة</div>
                <div id="pendingOrders" class="text-4xl font-black text-slate-800">--</div>
            </div>
            <div class="stat-card bg-gradient-daily p-6 shadow-xl border-none">
                <div class="text-blue-100 text-xs font-bold mb-1 uppercase text-right">مبيعات اليوم</div>
                <div id="dailyRevenue" class="text-3xl font-black text-white">0.000 BHD</div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden mb-10 text-right">
            <div class="p-6 border-b border-slate-50 font-bold text-slate-800 text-lg">جدول العمليات المالية</div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-slate-50 text-slate-500 text-xs font-bold uppercase border-b">
                        <tr>
                            <th class="px-6 py-4 text-right">الفاتورة</th>
                            <th class="px-6 py-4 text-right">الاسم</th>
                            <th class="px-6 py-4 text-right">الإجمالي (F)</th>
                            <th class="px-6 py-4 text-center">الحالة</th>
                            <th class="px-6 py-4 text-center border-r">الإجراء</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100 text-sm text-right"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="paymentModal" class="modal">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full mx-4 text-right border border-slate-100">
            <h2 class="text-xl font-bold mb-6 text-slate-800 text-center">تأكيد استلام الدفع</h2>
            <div class="space-y-5">
                <div>
                    <label class="text-xs font-bold text-slate-400">مبلغ الفاتورة الكلي:</label>
                    <input id="modalTotal" type="text" disabled class="w-full bg-slate-50 p-3 rounded-lg border font-bold text-slate-700 mt-1 text-center">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-blue-600 uppercase font-black">بنفت (I)</label>
                        <input id="benefitInput" type="number" step="0.001" class="w-full p-3 rounded-lg border border-blue-200 focus:ring-4 focus:ring-blue-100 outline-none font-black text-lg text-blue-800">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-green-600 uppercase font-black">كاش (H)</label>
                        <input id="cashInput" type="number" step="0.001" class="w-full p-3 rounded-lg border border-green-200 focus:ring-4 focus:ring-green-100 outline-none font-black text-lg text-green-800">
                    </div>
                </div>
                <div class="flex flex-col gap-2 pt-4">
                    <button id="submitPayBtn" onclick="submitPayment('تم الدفع')" class="w-full bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-800 transition text-xl">تأكيد الإتمام</button>
                    <button onclick="closeModal()" class="w-full bg-slate-100 text-slate-600 font-bold py-2 rounded-xl hover:bg-slate-200 transition">إغلاق</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSVDfAAvXCHzUgySBRT3p61ZnQ49HdR0UUwLDpTTar9_hWyYjQKtKv6lMvbFYteHgorJ07XUUw86ut2/pub?gid=0&single=true&output=csv';
        const n8nWebhookUrl = 'https://n8n.awj-bh.cloud/webhook/update-status';
        let currentInv = null;

        function smartSplit(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let char of line) {
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else { current += char; }
            }
            result.push(current.trim());
            return result;
        }

        async function fetchData() {
            try {
                const response = await fetch(`${csvUrl}&cb=${Date.now()}`);
                const data = await response.text();
                const lines = data.split(/\r?\n/);
                const rows = lines.slice(1).map(line => smartSplit(line)).filter(r => r.length >= 7);
                updateDashboard(rows);
            } catch (err) { console.error("Fetch error", err); }
        }

        function isMatchToday(dateString) {
            if (!dateString) return false;
            const now = new Date();
            const d = now.getDate().toString().padStart(2, '0');
            const m = (now.getMonth() + 1).toString().padStart(2, '0');
            const y = now.getFullYear().toString();
            
            // تحقق مرن من وجود اليوم والشهر والسنة في السلسلة النصية
            return dateString.includes(d) && dateString.includes(m) && dateString.includes(y);
        }

        function updateDashboard(rows) {
            let phoneNumbers = new Set(), todayOrdersCount = 0, pendingCount = 0, todayRevenueSum = 0;
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            [...rows].reverse().forEach((row, index) => {
                const dateCreated = row[0] || ""; 
                const invId = row[1]; 
                const name = row[2]; 
                const phone = row[3]; 
                const totalValF = parseFloat(row[5].replace(/[^\d.]/g, '')) || 0; 
                const status = (row[6] || "").trim(); 
                const datePaidJ = row[9] || ""; 

                if (phone && phone.trim().length > 3) phoneNumbers.add(phone.trim());

                const createdToday = isMatchToday(dateCreated);
                const paidToday = isMatchToday(datePaidJ);
                const isPaid = (status === "تم الدفع");

                if (createdToday) todayOrdersCount++;
                if (isPaid && paidToday) todayRevenueSum += totalValF;
                if (!isPaid && status !== "ملغي") pendingCount++;

                if (index < 30) {
                    const statusClass = isPaid ? "bg-green-100 text-green-700" : (status === "ملغي" ? "bg-red-100 text-red-700" : "bg-amber-100 text-amber-600");
                    const tr = `
                        <tr class="hover:bg-slate-50 transition border-b border-slate-50">
                            <td class="px-6 py-4 font-bold text-slate-900">#${invId}</td>
                            <td class="px-6 py-4 font-medium">${name}</td>
                            <td class="px-6 py-4 font-bold text-indigo-700">${totalValF.toFixed(3)}</td>
                            <td class="px-6 py-4 text-center">
                                <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${statusClass}">${status || 'تحت المعالجة'}</span>
                            </td>
                            <td class="px-6 py-4 text-center border-r flex justify-center gap-2">
                                ${(!isPaid && status !== 'ملغي') ? 
                                `<button onclick="openModal('${invId}', '${totalValF}')" class="bg-blue-600 text-white text-[10px] px-4 py-2 rounded-md hover:bg-blue-700 transition">تأكيد الدفع</button>
                                 <button onclick="cancelInvoice('${invId}')" class="bg-red-50 text-red-600 text-[10px] px-4 py-2 rounded-md hover:bg-red-100 transition border border-red-200">إلغاء</button>` : 
                                `<span class="text-slate-400 text-[10px] font-bold italic">${isPaid ? 'مكتمل ✅' : 'ملغاة ✕'}</span>`}
                            </td>
                        </tr>`;
                    tableBody.insertAdjacentHTML('beforeend', tr);
                }
            });

            document.getElementById('totalCustomers').innerText = phoneNumbers.size;
            document.getElementById('todayOrders').innerText = todayOrdersCount;
            document.getElementById('pendingOrders').innerText = pendingCount;
            document.getElementById('dailyRevenue').innerText = todayRevenueSum.toFixed(3) + " BHD";
        }

        function openModal(id, amount) {
            currentInv = id;
            document.getElementById('modalTotal').value = parseFloat(amount).toFixed(3) + " BHD";
            document.getElementById('benefitInput').value = amount;
            document.getElementById('cashInput').value = 0;
            document.getElementById('paymentModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('paymentModal').style.display = 'none'; }

        async function submitPayment(statusType) {
            const btn = document.getElementById('submitPayBtn');
            const cash = parseFloat(document.getElementById('cashInput').value) || 0;
            const benefit = parseFloat(document.getElementById('benefitInput').value) || 0;
            const now = new Date();
            const paymentDate = `${now.getDate().toString().padStart(2, '0')}/${(now.getMonth() + 1).toString().padStart(2, '0')}/${now.getFullYear()}`;

            btn.disabled = true;
            btn.innerText = "جاري الإرسال...";
            try {
                await fetch(n8nWebhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ invoiceId: currentInv, status: statusType, cash, benefit, paymentDate })
                });
                closeModal();
                setTimeout(fetchData, 1500); 
            } catch (err) { alert('خطأ في الاتصال'); }
            finally { btn.disabled = false; btn.innerText = "تأكيد الإتمام"; }
        }

        async function cancelInvoice(invId) {
            if(!confirm('هل أنت متأكد من إلغاء الفاتورة؟')) return;
            try {
                await fetch(n8nWebhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ invoiceId: invId, status: "ملغي", cash: 0, benefit: 0, paymentDate: "" })
                });
                setTimeout(fetchData, 1000);
            } catch (err) { alert('خطأ في الاتصال'); }
        }

        document.getElementById('currentDateDisplay').innerText = new Date().toLocaleDateString('ar-BH');
        fetchData();
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
