async function fetchData() {
    const { data, error } = await supabaseClient
        .from('invoices')
        .select('*')
        .order('created_at', { ascending: false });

    if (!error) {
        // هنا تضع الكود الخاص بعرض البيانات في الجداول كما كان في ملفك الأصلي
        console.log("البيانات المستلمة:", data);
        updateUI(data); 
    }
}
