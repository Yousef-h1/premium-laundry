<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Laundry Dashboard</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="الإدارة">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .safe-area { padding-bottom: env(safe-area-inset-bottom); }
        .stat-card { border-radius: 1rem; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(4px); align-items: flex-end; justify-content: center; z-index: 100; }
        @media (min-width: 640px) { .modal { align-items: center; } }
        .modal-content { width: 100%; border-radius: 1.5rem 1.5rem 0 0; animation: slideUp 0.3s ease-out; }
        @media (min-width: 640px) { .modal-content { width: 400px; border-radius: 1.5rem; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        /* شاشة القفل */
        #lockScreen { position: fixed; inset: 0; background: #1e40af; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .lock-card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        
        /* تحسينات اللمس للجوال */
        button { cursor: pointer; touch-action: manipulation; }
    </style>
</head>
<body class="p-3 md:p-6 text-right pb-10">

    <div id="lockScreen">
        <div class="lock-card">
            <div class="text-4xl mb-4">🔐</div>
            <h2 class="text-xl font-black mb-6 text-slate-800">نظام الإدارة</h2>
            <input type="password" id="passInput" placeholder="كلمة المرور" class="w-full p-4 rounded-xl border-2 border-slate-100 text-center text-2xl font-bold mb-4 outline-none focus:border-blue-500 transition-all">
            <button onclick="checkPass()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700">دخول</button>
        </div>
    </div>

    <div id="mainContent" class="hidden max-w-md mx-auto md:max-w-7xl">
        <header class="bg-white p-4 rounded-2xl shadow-sm mb-4 border border-slate-200">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-xl font-black text-slate-800">إدارة المغسلة</h1>
                    <p class="text-slate-500 text-[10px]">نظام التدقيق المالي الذكي</p>
                </div>
                <div class="bg-blue-600 text-white px-3 py-1 rounded-lg text-xs font-bold shadow-sm" id="currentDateDisplay"></div>
            </div>
            <button onclick="fetchData()" class="w-full mt-4 bg-slate-100 hover:bg-slate-200 text-slate-700 py-2.5 rounded-xl text-xs font-bold transition border border-slate-200">
                تحديث البيانات ↻
            </button>
        </header>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
            <div class="stat-card bg-white p-4 shadow-sm border border-slate-100 border-b-4 border-b-blue-500">
                <div class="text-blue-500 text-[10px] font-bold mb-1 uppercase text-center">العملاء</div>
                <div id="totalCustomers" class="text-2xl font-black text-slate-800 text-center">--</div>
            </div>
            <div class="stat-card bg-white p-4 shadow-sm border border-slate-100 border-b-4 border-b-green-500">
                <div class="text-green-500 text-[10px] font-bold mb-1 uppercase text-center">طلبات اليوم</div>
                <div id="todayOrders" class="text-2xl font-black text-slate-800 text-center">--</div>
            </div>
            <div class="stat-card bg-white p-4 shadow-sm border border-slate-100 border-b-4 border-b-amber-500">
                <div class="text-amber-500 text-[10px] font-bold mb-1 uppercase text-center">قيد المعالجة</div>
                <div id="pendingOrders" class="text-2xl font-black text-slate-800 text-center">--</div>
            </div>
            <div class="stat-card bg-blue-700 p-4 shadow-md border-none">
                <div class="text-blue-100 text-[10px] font-bold mb-1 uppercase text-center">مبيعات اليوم</div>
                <div id="dailyRevenue" class="text-lg font-black text-white text-center">0.000</div>
            </div>
        </div>

        <div class="mb-4 flex justify-between items-center px-1">
            <h2 class="font-bold text-slate-800 text-sm">أحدث العمليات</h2>
            <span class="text-[10px] text-slate-400">آخر 30 فاتورة</span>
        </div>
        
        <div id="mobileList" class="space-y-3">
            <div class="text-center py-10 text-slate-400 text-xs">جاري تحميل البيانات...</div>
        </div>
    </div>

    <div id="paymentModal" class="modal">
        <div class="modal-content bg-white p-6 shadow-2xl text-right border-t border-slate-200">
            <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-6"></div>
            <h2 class="text-lg font-black mb-6 text-slate-800 text-center">تأكيد استلام الدفع</h2>
            <div class="space-y-4 mb-6">
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <label class="text-[10px] font-bold text-slate-400 block mb-1">المبلغ المطلوب:</label>
                    <input id="modalTotal" type="text" disabled class="w-full bg-transparent font-black text-2xl text-slate-800 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-blue-50 p-3 rounded-xl border border-blue-100">
                        <label class="text-[10px] font-black text-blue-600 block mb-1 uppercase">بنفت (I)</label>
                        <input id="benefitInput" type="number" step="0.001" class="w-full bg-transparent text-xl font-black text-blue-800 outline-none">
                    </div>
                    <div class="bg-green-50 p-3 rounded-xl border border-green-100">
                        <label class="text-[10px] font-black text-green-600 block mb-1 uppercase">كاش (H)</label>
                        <input id="cashInput" type="number" step="0.001" class="w-full bg-transparent text-xl font-black text-green-800 outline-none">
                    </div>
                </div>
            </div>
            <div class="space-y-3 safe-area">
                <button id="submitPayBtn" onclick="submitPayment('تم الدفع')" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-lg uppercase">تأكيد الإتمام ✅</button>
                <button onclick="closeModal()" class="w-full bg-slate-100 text-slate-500 font-bold py-3 rounded-2xl active:scale-95 transition-all">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        function checkPass() {
            const pass = document.getElementById('passInput').value;
            if (pass === '0005') {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('mainContent').classList.remove('hidden');
                fetchData();
            } else {
                alert('كلمة المرور خاطئة!');
            }
        }

        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSVDfAAvXCHzUgySBRT3p61ZnQ49HdR0UUwLDpTTar9_hWyYjQKtKv6lMvbFYteHgorJ07XUUw86ut2/pub?gid=0&single=true&output=csv';
        const n8nWebhookUrl = 'https://n8n.awj-bh.cloud/webhook/725f1ccb-6fa7-421d-9b68-8b60322702c3';
        let currentInv = null;

        function smartSplit(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let char of line) {
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else { current += char; }
            }
            result.push(current.trim());
            return result;
        }

        async function fetchData() {
            try {
                const response = await fetch(`${csvUrl}&cb=${Date.now()}`);
                const data = await response.text();
                const lines = data.split(/\r?\n/);
                const rows = lines.slice(1).map(line => smartSplit(line)).filter(r => r.length >= 7);
                updateDashboard(rows);
            } catch (err) { console.error("Fetch error", err); }
        }

        function isMatchToday(dateString) {
            if (!dateString) return false;
            const now = new Date();
            const d = now.getDate().toString().padStart(2, '0');
            const m = (now.getMonth() + 1).toString().padStart(2, '0');
            const y = now.getFullYear().toString();
            return dateString.includes(d) && dateString.includes(m) && dateString.includes(y);
        }

        function updateDashboard(rows) {
            let phoneNumbers = new Set(), todayOrdersCount = 0, pendingCount = 0, todayRevenueSum = 0;
            const mobileList = document.getElementById('mobileList');
            mobileList.innerHTML = '';

            [...rows].reverse().forEach((row, index) => {
                const dateCreated = row[0] || ""; 
                const invId = row[1]; 
                const name = row[2]; 
                const phone = row[3]; 
                const totalValF = parseFloat(row[5].replace(/[^\d.]/g, '')) || 0; 
                const status = (row[6] || "").trim(); 
                const datePaidJ = row[9] || ""; 

                if (phone && phone.trim().length > 3) phoneNumbers.add(phone.trim());

                const createdToday = isMatchToday(dateCreated);
                const paidToday = isMatchToday(datePaidJ);
                const isPaid = (status === "تم الدفع");

                if (createdToday) todayOrdersCount++;
                if (isPaid && paidToday) todayRevenueSum += totalValF;
                if (!isPaid && status !== "ملغي") pendingCount++;

                if (index < 30) {
                    const statusClass = isPaid ? "bg-green-100 text-green-700" : (status === "ملغي" ? "bg-red-100 text-red-700" : "bg-amber-100 text-amber-600");
                    const card = `
                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col space-y-3">
                            <div class="flex justify-between items-center">
                                <div class="flex flex-col">
                                    <span class="text-[16px] font-black text-blue-600 mb-0">#${invId}</span>
                                    <span class="text-base font-black text-slate-800 leading-tight">${name}</span>
                                    <span class="text-sm font-bold text-slate-500 mt-1">${totalValF.toFixed(3)} BHD</span>
                                </div>
                                <span class="px-3 py-1 rounded-md text-[11px] font-black uppercase ${statusClass}">${status || 'قيد الانتظار'}</span>
                            </div>

                            <div class="flex items-center justify-between gap-2 pt-2 border-t border-slate-50">
                                <button onclick="resendInvoice('${invId}')" class="flex-1 bg-slate-100 text-slate-600 text-[11px] py-3 rounded-xl border border-slate-200 font-bold active:scale-95 transition-all">إعادة إرسال ✉️</button>
                                
                                <div class="flex gap-2 flex-1">
                                    ${(!isPaid && status !== 'ملغي') ? 
                                    `<button onclick="openModal('${invId}', '${totalValF}')" class="flex-1 bg-blue-600 text-white text-[11px] py-3 rounded-xl font-black shadow-md active:scale-95 transition-all">دفع</button>
                                     <button onclick="cancelInvoice('${invId}')" class="bg-red-50 text-red-600 text-[11px] px-3 py-3 rounded-xl border border-red-100 font-bold active:scale-95 transition-all">إلغاء</button>` : 
                                    `<div class="flex-1 text-left px-2"><span class="text-slate-400 text-[10px] font-black italic">${isPaid ? 'مكتمل ✅' : 'ملغي ✕'}</span></div>`}
                                </div>
                            </div>
                        </div>`;
                    mobileList.insertAdjacentHTML('beforeend', card);
                }
            });

            document.getElementById('totalCustomers').innerText = phoneNumbers.size;
            document.getElementById('todayOrders').innerText = todayOrdersCount;
            document.getElementById('pendingOrders').innerText = pendingCount;
            document.getElementById('dailyRevenue').innerText = todayRevenueSum.toFixed(3);
        }

        async function resendInvoice(invId) {
            if(!confirm('هل تريد إعادة إرسال الفاتورة للعميل؟')) return;
            try {
                const response = await fetch(n8nWebhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ invoiceId: invId, action: "resend_invoice" })
                });
                if(response.ok) { alert('جاري إعادة إرسال الفاتورة...'); } 
                else { alert('فشل في الإرسال'); }
            } catch (err) { alert('خطأ في الاتصال'); }
        }

        function openModal(id, amount) {
            currentInv = id;
            document.getElementById('modalTotal').value = parseFloat(amount).toFixed(3) + " BHD";
            document.getElementById('benefitInput').value = amount;
            document.getElementById('cashInput').value = 0;
            document.getElementById('paymentModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('paymentModal').style.display = 'none'; }

        async function submitPayment(statusType) {
            const btn = document.getElementById('submitPayBtn');
            const cash = parseFloat(document.getElementById('cashInput').value) || 0;
            const benefit = parseFloat(document.getElementById('benefitInput').value) || 0;
            const now = new Date();
            const paymentDate = `${now.getDate().toString().padStart(2, '0')}/${(now.getMonth() + 1).toString().padStart(2, '0')}/${now.getFullYear()}`;

            btn.disabled = true;
            btn.innerText = "جاري الإرسال...";
            try {
                await fetch(n8nWebhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ invoiceId: currentInv, status: statusType, cash, benefit, paymentDate })
                });
                closeModal();
                setTimeout(fetchData, 1500); 
            } catch (err) { alert('خطأ في الاتصال'); }
            finally { btn.disabled = false; btn.innerText = "تأكيد الإتمام ✅"; }
        }

        async function cancelInvoice(invId) {
            if(!confirm('هل أنت متأكد من إلغاء الفاتورة؟')) return;
            try {
                await fetch(n8nWebhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ invoiceId: invId, status: "ملغي", cash: 0, benefit: 0, paymentDate: "" })
                });
                setTimeout(fetchData, 1000);
            } catch (err) { alert('خطأ في الاتصال'); }
        }

        document.getElementById('currentDateDisplay').innerText = new Date().toLocaleDateString('ar-BH');
    </script>
</body>
</html>
