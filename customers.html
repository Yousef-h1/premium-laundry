<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>إدارة العملاء - Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .tab-active { background-color: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .app-card { transition: all 0.2s ease; }
        .app-card:active { transform: scale(0.97); background-color: #f1f5f9; }
        #lockScreen { position: fixed; inset: 0; background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .lock-card { background: white; padding: 30px; border-radius: 40px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        input[type="password"], input[type="tel"] { border-radius: 18px; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 pb-24">

    <div id="lockScreen">
        <div class="lock-card">
            <div class="text-6xl mb-4">🔐</div>
            <h2 class="text-xl font-black mb-6 text-slate-800">إدارة المسؤولين</h2>
            <input type="password" id="passInput" placeholder="الرمز السري" 
                   class="w-full p-5 bg-slate-50 border-2 border-slate-100 text-center text-3xl font-bold mb-5 outline-none focus:border-blue-500 transition-all">
            <button onclick="checkPass()" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl shadow-xl active:scale-95 transition-all">فتح النظام</button>
        </div>
    </div>

    <div id="mainContent" class="hidden animate-fade-in">
        <header class="max-w-4xl mx-auto mb-6 flex justify-between items-center bg-white p-4 rounded-[2rem] shadow-sm border border-slate-100">
            <div class="flex items-center gap-3">
                <a href="index.html" class="p-3 bg-slate-50 rounded-2xl border border-slate-100 text-xl">🏠</a>
                <div>
                    <h1 class="text-lg font-black text-slate-800 leading-none">إدارة العملاء</h1>
                    <span class="text-[10px] text-blue-500 font-bold uppercase">Cloud System v3.0</span>
                </div>
            </div>
            <button onclick="logout()" class="p-3 bg-red-50 text-red-500 rounded-2xl border border-red-100 font-black text-xs">خروج</button>
        </header>

        <div class="max-w-4xl mx-auto">
            <div class="flex bg-white rounded-2xl shadow-sm border border-slate-100 mb-6 p-1.5">
                <button onclick="switchTab('search')" id="tabSearch" class="flex-1 py-4 font-black text-sm transition rounded-xl tab-active">🔍 بحث شامل</button>
                <button onclick="switchTab('credit')" id="tabCredit" class="flex-1 py-4 font-black text-sm text-slate-400 transition rounded-xl">📅 كشف شهري</button>
            </div>

            <div id="sectionSearch" class="space-y-4">
                <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm space-y-4">
                    <input type="tel" id="searchPhone" placeholder="رقم الهاتف (33xxxxxx)" 
                           class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl text-center text-3xl font-black focus:border-blue-500 outline-none transition-all placeholder:text-slate-200">
                    
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="fetchFromSupabase('pending')" class="bg-blue-600 text-white font-black py-5 rounded-2xl shadow-lg active:scale-95 transition-all">فواتير مستحقة</button>
                        <button onclick="fetchFromSupabase('all')" class="bg-slate-800 text-white font-black py-5 rounded-2xl shadow-lg active:scale-95 transition-all">كل السجل</button>
                    </div>
                </div>

                <div id="bulkAction" class="hidden">
                    <button onclick="sendBulkWhatsapp()" class="w-full bg-green-600 text-white font-black py-5 rounded-2xl shadow-lg flex items-center justify-center gap-2 text-lg">
                        <span>📱</span> إرسال مطالبة شاملة
                    </button>
                </div>

                <div id="searchResult" class="space-y-4"></div>
            </div>

            <div id="sectionCredit" class="hidden space-y-4">
                <div class="bg-blue-50 border-r-4 border-blue-500 p-5 rounded-2xl text-right">
                    <p class="text-blue-800 text-xs font-bold leading-relaxed">عرض الفواتير المستحقة للعملاء الدائمين المسموح لهم بالدفع الآجل.</p>
                </div>
                <div id="creditList" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <div id="payModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden z-50 items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[3rem] p-8 shadow-2xl relative">
            <div class="w-16 h-1.5 bg-slate-200 rounded-full mx-auto mb-8"></div>
            <div class="space-y-6">
                <h3 class="text-center font-black text-slate-800 text-xl">تحديث حالة الفاتورة</h3>
                <div class="bg-slate-50 p-6 rounded-3xl border-2 border-slate-100 text-center">
                    <label class="text-[10px] font-black text-slate-400 block mb-2 uppercase">المبلغ المقبوض (BHD)</label>
                    <input id="editAmount" type="number" step="0.001" class="w-full bg-transparent text-5xl font-black text-slate-800 outline-none text-center">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="updateInvoiceStatus()" class="bg-blue-600 text-white font-black py-5 rounded-3xl shadow-xl active:scale-95 transition-all">تم الدفع ✅</button>
                    <button id="whatsappBtn" class="bg-green-500 text-white font-black py-5 rounded-3xl shadow-xl active:scale-95 transition-all">واتساب 📱</button>
                </div>
                <button onclick="closeModal()" class="w-full py-2 text-slate-400 font-bold">إغلاق</button>
            </div>
        </div>
    </div>

    <script>
        // إعداد Supabase
        const SUPABASE_URL = 'https://aocsaoveaooewncirufr.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvY3Nhb3ZlYW9vZXduY2lydWZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzM1ODYsImV4cCI6MjA5MjEwOTU4Nn0.IV5fSBv9B1Mnf4xKLnFNrHmlobdYGKRqzhm9XrEdJRU';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let activeInvoice = null;
        let currentResults = [];

        function checkPass() {
            if (document.getElementById('passInput').value === '0005') {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('mainContent').classList.remove('hidden');
            } else { alert('❌ الرمز السري خطأ'); }
        }

        function logout() { location.reload(); }

        function switchTab(tab) {
            document.getElementById('sectionSearch').classList.toggle('hidden', tab !== 'search');
            document.getElementById('sectionCredit').classList.toggle('hidden', tab !== 'credit');
            document.getElementById('tabSearch').classList.toggle('tab-active', tab === 'search');
            document.getElementById('tabCredit').classList.toggle('tab-active', tab === 'credit');
            document.getElementById('tabSearch').classList.toggle('text-slate-400', tab !== 'search');
            document.getElementById('tabCredit').classList.toggle('text-slate-400', tab !== 'credit');
            if(tab === 'credit') fetchMonthlyCredit();
        }

        async function fetchFromSupabase(type) {
            const phone = document.getElementById('searchPhone').value.trim();
            if(!phone) return alert("يرجى إدخال رقم الهاتف");

            const container = document.getElementById('searchResult');
            container.innerHTML = '<p class="text-center py-10 animate-pulse font-bold text-slate-400">جاري البحث...</p>';

            let query = supabaseClient.from('invoices').select('*').ilike('phone', `%${phone}%`).order('created_at', { ascending: false });
            
            if (type === 'pending') {
                query = query.not('status', 'eq', 'تم الدفع');
            }

            const { data, error } = await query;

            if (error) { alert("حدث خطأ في جلب البيانات"); return; }
            
            currentResults = data;
            renderSearchCards(data);
            document.getElementById('bulkAction').classList.toggle('hidden', type !== 'pending' || data.length === 0);
        }

        function renderSearchCards(results) {
            const container = document.getElementById('searchResult');
            container.innerHTML = results.length ? '' : '<div class="text-center py-20 text-slate-300 font-bold">لا توجد نتائج</div>';
            
            results.forEach(row => {
                const amount = parseFloat(row.total_amount || 0).toFixed(3);
                container.insertAdjacentHTML('beforeend', `
                    <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm mb-4 app-card">
                        <div class="flex justify-between items-center mb-4 text-xs font-black">
                            <span class="text-blue-600">#${row.inv_num}</span>
                            <span class="bg-slate-100 px-3 py-1 rounded-full text-slate-500 uppercase">${row.status || 'معلق'}</span>
                        </div>
                        <h4 class="font-black text-slate-800 text-lg mb-1">${row.customer_name}</h4>
                        <div class="text-[10px] font-bold text-slate-400 mb-4">${new Date(row.created_at).toLocaleDateString('ar-BH')}</div>
                        <div class="bg-slate-50 p-4 rounded-2xl text-xs text-slate-600 border border-slate-100 mb-5 whitespace-pre-line">${row.services || '---'}</div>
                        <div class="flex justify-between items-center">
                            <span class="text-2xl font-black text-slate-900">${amount} <small class="text-[10px]">BHD</small></span>
                            <button onclick="openActionModal('${row.inv_num}', '${amount}', '${row.phone}')" class="bg-slate-900 text-white px-8 py-4 rounded-2xl text-xs font-black shadow-lg">إدارة</button>
                        </div>
                    </div>
                `);
            });
        }

        async function fetchMonthlyCredit() {
            const container = document.getElementById('creditList');
            container.innerHTML = '<p class="text-center py-20 animate-pulse font-bold text-slate-400">جاري تجميع البيانات...</p>';

            const { data, error } = await supabaseClient
                .from('invoices')
                .select('*')
                .eq('is_monthly', 'نعم')
                .not('status', 'eq', 'تم الدفع');

            if (error) return;

            const summary = {};
            data.forEach(row => {
                const key = row.phone;
                if (!summary[key]) summary[key] = { name: row.customer_name, phone: row.phone, total: 0, count: 0 };
                summary[key].total += parseFloat(row.total_amount || 0);
                summary[key].count++;
            });

            container.innerHTML = '';
            Object.values(summary).forEach(c => {
                container.insertAdjacentHTML('beforeend', `
                    <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm border-r-[12px] border-r-blue-600 app-card">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-[10px] font-bold text-slate-400">${c.count} فواتير مستحقة</span>
                            <span class="bg-blue-50 text-blue-600 px-2 py-1 rounded-lg text-[10px] font-black italic underline cursor-pointer" onclick="openCustomerDetails('${c.phone}')">كشف التفاصيل</span>
                        </div>
                        <h3 class="font-black text-slate-800 text-xl">${c.name}</h3>
                        <div class="flex justify-between items-center pt-6 border-t mt-5">
                            <span class="text-3xl font-black text-blue-700">${c.total.toFixed(3)} BHD</span>
                            <button onclick="shareOnWhatsapp('${c.phone}', '${c.name}', '${c.total.toFixed(3)}')" class="bg-green-600 text-white p-5 rounded-2xl shadow-lg">📱</button>
                        </div>
                    </div>
                `);
            });
        }

        function openActionModal(id, amt, phone) {
            activeInvoice = { id, amount: amt, phone };
            document.getElementById('editAmount').value = amt;
            document.getElementById('payModal').classList.remove('hidden');
            document.getElementById('payModal').classList.add('flex');
            document.getElementById('whatsappBtn').onclick = () => {
                const msg = encodeURIComponent(`عزيزي العميل، فاتورتك #${id} بمبلغ ${amt} BHD جاهزة للاستلام.`);
                window.open(`https://wa.me/973${phone}?text=${msg}`);
            };
        }

        function closeModal() { document.getElementById('payModal').classList.add('hidden'); }

        async function updateInvoiceStatus() {
            if (!activeInvoice) return;
            const btn = event.target;
            const newAmount = document.getElementById('editAmount').value;
            btn.disabled = true; btn.innerText = "جاري الحفظ...";

            const { error } = await supabaseClient
                .from('invoices')
                .update({ status: 'تم الدفع', total_amount: newAmount })
                .eq('inv_num', activeInvoice.id);

            if (!error) {
                closeModal();
                fetchFromSupabase('pending');
            } else { alert("فشل التحديث"); }
            btn.disabled = false; btn.innerText = "تم الدفع ✅";
        }

        function shareOnWhatsapp(phone, name, total) {
            const msg = encodeURIComponent(`مرحباً ${name}، نود تذكيركم بأن إجمالي المبالغ المستحقة حالياً هو ${total} BHD. شكراً لتعاملكم مع Premium Laundry.`);
            window.open(`https://wa.me/973${phone}?text=${msg}`);
        }

        function sendBulkWhatsapp() {
            if (!currentResults.length) return;
            const name = currentResults[0].customer_name;
            const phone = currentResults[0].phone;
            let total = 0;
            let msg = `مرحباً ${name}، نود تذكيركم بالفواتير المستحقة:\n`;
            currentResults.forEach((r, i) => {
                total += parseFloat(r.total_amount || 0);
                msg += `${i+1}. #${r.inv_num} (${parseFloat(r.total_amount).toFixed(3)} BHD)\n`;
            });
            msg += `\nإجمالي المبلغ: ${total.toFixed(3)} BHD`;
            window.open(`https://wa.me/973${phone}?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
