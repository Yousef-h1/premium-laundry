<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق الإدارة</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="إدارة المغسلة">
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f0f9ff;
            -webkit-tap-highlight-color: transparent;
        }
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            background-color: #ffffff;
            min-height: 100vh;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .main-button {
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            touch-action: manipulation;
        }
        .main-button:active {
            transform: scale(0.96);
            opacity: 0.9;
        }
        .logo-img {
            width: 240px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.08));
        }
        /* تحسين مظهر شريط الحالة في الآيفون */
        .safe-area-pt { padding-top: env(safe-area-inset-top); }
    </style>
</head>
<body>

    <div class="app-container">
        
        <header class="flex flex-col items-center justify-center pt-16 pb-10 px-6 bg-gradient-to-b from-blue-50 to-white safe-area-pt">
            <div class="mb-2">
                <img src="logo.png" alt="Logo" class="logo-img">
            </div>
            <div class="w-16 h-1 bg-blue-100 rounded-full mt-6"></div>
        </header>

        <div class="px-8 mb-8 text-center">
            <h2 class="text-xl font-black text-slate-800">نظام الإدارة المركزي</h2>
            <p class="text-slate-500 text-sm mt-1">اختر القسم الذي تود إدارته الآن</p>
        </div>

        <main class="flex-grow px-6 space-y-5 pb-10">
            
            <a href="dashboard.html" class="main-button w-full items-center justify-between bg-blue-600 text-white p-6 rounded-[2rem] shadow-lg shadow-blue-500/30 hover:bg-blue-700 decoration-none">
                <div class="flex items-center gap-4 text-right">
                    <div class="bg-white/20 p-3 rounded-2xl text-white">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    </div>
                    <div>
                        <span class="block text-xl font-black">لوحة التحكم</span>
                        <span class="block text-xs text-blue-100 font-normal">مراقبة الأداء والطلبات</span>
                    </div>
                </div>
                <svg class="w-6 h-6 text-blue-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </a>

            <a href="customers.html" class="main-button w-full items-center justify-between bg-white text-slate-800 p-6 rounded-[2rem] shadow-sm border border-slate-100 hover:bg-slate-50 decoration-none">
                <div class="flex items-center gap-4 text-right">
                    <div class="bg-blue-50 p-3 rounded-2xl text-blue-600">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    </div>
                    <div>
                        <span class="block text-xl font-black text-slate-700">إدارة العملاء</span>
                        <span class="block text-xs text-slate-400 font-normal">البحث عن الفواتير والتحصيل</span>
                    </div>
                </div>
                <svg class="w-6 h-6 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </a>

            <a href="accounting.html" class="main-button w-full items-center justify-between bg-white text-slate-800 p-6 rounded-[2rem] shadow-sm border border-slate-100 hover:bg-slate-50 decoration-none">
                <div class="flex items-center gap-4 text-right">
                    <div class="bg-slate-50 p-3 rounded-2xl text-blue-600">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                    </div>
                    <div>
                        <span class="block text-xl font-black text-slate-700">المحاسبة</span>
                        <span class="block text-xs text-slate-400 font-normal">التقارير المالية والمبيعات</span>
                    </div>
                </div>
                <svg class="w-6 h-6 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </a>

            <a href="invoices.html" class="main-button w-full items-center justify-between bg-white text-slate-800 p-6 rounded-[2rem] shadow-sm border border-slate-100 hover:bg-slate-50 decoration-none">
                <div class="flex items-center gap-4 text-right">
                    <div class="bg-green-50 p-3 rounded-2xl text-green-600">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    </div>
                    <div>
                        <span class="block text-xl font-black text-green-700">إنشاء فاتورة</span>
                        <span class="block text-xs text-slate-400 font-normal">تسجيل طلبات جديدة</span>
                    </div>
                </div>
                <svg class="w-6 h-6 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </a>

        </main>

        <footer class="pb-10 text-center">
            <p class="text-[10px] text-slate-300 font-bold uppercase tracking-widest">Premium Service Laundry v1.0</p>
        </footer>

    </div>

</body>
</html>
