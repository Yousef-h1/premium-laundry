<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مغسلة الخدمة المميزة - POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #2563eb; --danger: #ef4444; --success: #10b981; --bg: #f8fafc; --warning: #f59e0b; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; padding: 0; }
        
        /* نظام الدخول */
        #loginOverlay { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-card { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 350px; }
        .login-card input { width: 80%; padding: 15px; margin: 20px 0; border: 2px solid #ddd; border-radius: 12px; font-size: 1.5rem; text-align: center; letter-spacing: 5px; }

        /* التصميم الرئيسي */
        .main-container { display: grid; grid-template-columns: 1fr 400px; height: 100vh; }
        @media (max-width: 900px) { .main-container { grid-template-columns: 1fr; height: auto; } }

        .input-panel { padding: 20px; overflow-y: auto; background: white; border-left: 1px solid #e2e8f0; }
        .invoice-preview { padding: 20px; background: white; overflow-y: auto; }

        .form-group { margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-family: 'Tajawal'; box-sizing: border-box; }

        .search-box { background: #eff6ff; padding: 15px; border-radius: 15px; border: 1px solid #bfdbfe; margin-bottom: 20px; }
        .btn-add { background: var(--success); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn-print { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 10px; width: 100%; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 20px; }

        /* جدول الفاتورة */
        .bill-item { border-bottom: 1px dashed #ddd; padding: 10px 0; position: relative; }
        .remove-btn { color: var(--danger); cursor: pointer; float: left; }
        .total-box { background: #1e293b; color: white; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; margin-top: 20px; }

        @media print { .no-print { display: none !important; } .main-container { display: block; } .invoice-preview { width: 100%; } }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h2 style="color:var(--primary)">الخدمة المميزة 🧺</h2>
        <input type="password" id="passInput" placeholder="••••" maxlength="4">
        <button class="btn-add" onclick="login()">دخول</button>
    </div>
</div>

<div class="main-container" id="app" style="display:none;">
    <div class="input-panel no-print">
        <div class="search-box">
            <label>🔍 بحث سريع (رقم هاتف أو فاتورة)</label>
            <input type="text" id="searchInput" placeholder="أدخل الرقم واضغط Enter..." onkeypress="handleSearch(event)">
        </div>

        <h4>بيانات العميل</h4>
        <div class="form-group"><input type="text" id="custName" placeholder="اسم الزبون"></div>
        <div class="form-group"><input type="tel" id="custPhone" placeholder="رقم الهاتف"></div>

        <h4>الخدمات</h4>
        <div class="form-group">
            <select id="itemType">
                <option value="ثوب | Thobe" data-price="0.500">ثوب (0.500)</option>
                <option value="غترة | Ghutra" data-price="0.200">غترة (0.200)</option>
                <option value="عباية | Abaya" data-price="1.000">عباية (1.000)</option>
                <option value="بطانية | Blanket" data-price="2.000">بطانية (2.000)</option>
            </select>
        </div>
        <div class="form-group">
            <input type="number" id="qty" value="1" min="1" placeholder="الكمية">
        </div>
        <div class="form-group">
            <select id="payMethod">
                <option value="كاش">كاش (Cash)</option>
                <option value="بنفت">بنفت (Benefit)</option>
            </select>
        </div>

        <button class="btn-add" onclick="addItem()">إضافة للطلب +</button>
    </div>

    <div class="invoice-preview" id="printArea">
        <div style="text-align: center; border-bottom: 2px solid #333;">
            <h2 style="margin:5px">مغسلة الخدمة المميزة</h2>
            <p>Premium Service Laundry</p>
        </div>

        <div style="display:flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee;">
            <span>رقم الفاتورة: #<b id="invNum">---</b></span>
            <span id="curDate"></span>
        </div>

        <div style="padding: 10px 0;">
            <div>الزبون: <b id="dispName">---</b></div>
            <div>الهاتف: <b id="dispPhone">---</b></div>
        </div>

        <div id="billItems"></div>

        <div class="total-box">
            <span>الإجمالي الكلي</span>
            <span id="finalTotal">0.000</span>
        </div>

        <button class="btn-print no-print" onclick="saveAndPrint()">اعتماد وطباعة 🖨️</button>
    </div>
</div>

<script>
    const CONFIG = {
        SEARCH_WEBHOOK: "https://n8n.awj-bh.cloud/webhook/6ef736b2-87a5-459f-864c-ee1e34b1a7a1",
        SAVE_WEBHOOK: "https://n8n.awj-bh.cloud/webhook-test/save-invoice-premium",
        PASSWORD: "0005"
    };

    let cart = [];

    function login() {
        if(document.getElementById('passInput').value === CONFIG.PASSWORD) {
            document.getElementById('loginOverlay').remove();
            document.getElementById('app').style.display = 'grid';
            document.getElementById('curDate').innerText = new Date().toLocaleDateString('en-GB');
            document.getElementById('invNum').innerText = Date.now().toString().slice(-6);
        } else { alert("رمز خاطئ!"); }
    }

    async function handleSearch(e) {
        if (e.key === 'Enter') {
            const query = e.target.value;
            const type = query.length >= 8 ? 'phone' : 'invoice';
            
            try {
                const res = await fetch(CONFIG.SEARCH_WEBHOOK, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ searchQuery: query, type: type })
                });
                const data = await res.json();
                
                if (data.found) {
                    document.getElementById('custName').value = data.customerName;
                    document.getElementById('custPhone').value = data.phone;
                    updateDisp();
                    if(data.status === "لم يتم الدفع") {
                        alert(`⚠️ تنبيه: العميل لديه مبالغ متأخرة ${data.total} BHD على فاتورة #${data.invoiceNumber}`);
                    }
                }
            } catch (err) { console.error("Search Error"); }
        }
    }

    function addItem() {
        const sel = document.getElementById('itemType');
        const item = {
            id: Date.now(),
            name: sel.value,
            price: parseFloat(sel.options[sel.selectedIndex].dataset.price),
            qty: parseInt(document.getElementById('qty').value)
        };
        cart.push(item);
        renderCart();
    }

    function renderCart() {
        const container = document.getElementById('billItems');
        container.innerHTML = '';
        let total = 0;
        cart.forEach(item => {
            total += (item.price * item.qty);
            container.innerHTML += `
                <div class="bill-item">
                    <span class="no-print remove-btn" onclick="removeItem(${item.id})">✕</span>
                    <b>${item.name}</b> x ${item.qty}
                    <span style="float:left">${(item.price * item.qty).toFixed(3)}</span>
                </div>`;
        });
        document.getElementById('finalTotal').innerText = total.toFixed(3) + " BHD";
    }

    function removeItem(id) {
        cart = cart.filter(i => i.id !== id);
        renderCart();
    }

    function updateDisp() {
        document.getElementById('dispName').innerText = document.getElementById('custName').value || "---";
        document.getElementById('dispPhone').innerText = document.getElementById('custPhone').value || "---";
    }

    document.getElementById('custName').oninput = updateDisp;
    document.getElementById('custPhone').oninput = updateDisp;

    async function saveAndPrint() {
        if (cart.length === 0) return alert("السلة فارغة");
        
        const method = document.getElementById('payMethod').value;
        const total = parseFloat(document.getElementById('finalTotal').innerText);

        const payload = {
            date: new Date().toLocaleDateString('en-GB'),
            invoiceNumber: document.getElementById('invNum').innerText,
            customer: document.getElementById('custName').value,
            phone: document.getElementById('custPhone').value,
            items: cart.map(i => `${i.name} x${i.qty}`).join(', '),
            total: total,
            status: "تم الدفع",
            cash: method === "كاش" ? total : 0,
            benefit: method === "بنفت" ? total : 0,
            paymentDate: new Date().toLocaleDateString('en-GB')
        };

        try {
            await fetch(CONFIG.SAVE_WEBHOOK, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            window.print();
            location.reload();
        } catch (err) { alert("خطأ في الاتصال بـ n8n"); }
    }
</script>
</body>
</html>
